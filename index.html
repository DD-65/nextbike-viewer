<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live-Übersicht freie Nextbikes</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="overview" aria-labelledby="page-title">
        <div class="copy">
          <h1 id="page-title">Verfügbare Nextbikes in KL</h1>
          <p class="lede">Live Infos via API</p>
        </div>

        <div class="status-panel">
          <div class="status-visual">
            <div id="stationMap" class="station-map" role="img" aria-label="OpenStreetMap view of the selected stations"></div>
          </div>
          <div aria-live="polite">
            <span class="status-label">Status</span>
            <strong id="statusText">Live-Daten werden geladen...</strong>
            <span id="updatedAt">Anfrage läuft...</span>
          </div>
        </div>
      </section>

      <section class="station-board" aria-label="Station bike availability">
        <div class="board-heading">
          <h2>Stationen</h2>
          <button id="refreshButton" type="button" class="refresh-button" aria-label="Refresh data">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 0 1-14.8 4.2M4 12A8 8 0 0 1 18.8 7.8M18.5 3.5v4.8h-4.8M5.5 20.5v-4.8h4.8" />
            </svg>
          </button>
        </div>

        <div id="stations" class="stations" aria-live="polite"></div>
      </section>
    </main>

    <a
      class="github-link"
      href="https://github.com/DD-65/nextbike-viewer"
      target="_blank"
      rel="noreferrer"
      aria-label="View this project on GitHub"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 .5C5.65.5.5 5.66.5 12.02c0 5.09 3.29 9.41 7.86 10.93.57.11.78-.25.78-.55 0-.27-.01-1.16-.02-2.11-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.2 1.77 1.2 1.04 1.77 2.72 1.26 3.38.97.1-.75.41-1.26.74-1.55-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.3 1.19-3.11-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.19a11.05 11.05 0 0 1 5.79 0c2.2-1.5 3.17-1.19 3.17-1.19.63 1.59.23 2.76.11 3.05.74.81 1.19 1.85 1.19 3.11 0 4.43-2.68 5.41-5.24 5.7.42.36.78 1.05.78 2.12 0 1.54-.01 2.78-.01 3.16 0 .31.2.67.79.55a11.53 11.53 0 0 0 7.85-10.93C23.5 5.66 18.35.5 12 .5Z"
        />
      </svg>
    </a>

    <template id="stationTemplate">
      <article class="station-card">
        <div class="station-meta">
          <span class="station-dot" aria-hidden="true"></span>
          <h3></h3>
        </div>
        <div class="bike-count">
          <strong></strong>
          <span>verfügbare Nextbikes</span>
        </div>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
